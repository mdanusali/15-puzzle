<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Puzzle Pro | Industrial Edition</title>
    <style>
        :root {
            --frame-bg: #1a1a1a;
            --sidebar-border: #333;
            --metal-gradient: linear-gradient(145deg, #e6e6e6, #ffffff);
            --metal-shine: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
            --text-dark: #2d3748;
            --accent-blue: #4a90e2;
            --victory-gold: #ffd700;
        }

        body {
            background: radial-gradient(circle, #333 0%, #000 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Layout Container */
        .app-container {
            display: flex;
            flex-direction: row;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #444;
            gap: 40px;
            max-width: 95vw;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--sidebar-border);
            padding-right: 30px;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0;
            letter-spacing: 1px;
            color: #eee;
            text-transform: uppercase;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        /* Select Menu Styling */
        select {
            background: #2d2d2d;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
        }

        /* Challenge Preview Grid */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 35px);
            grid-template-rows: repeat(4, 35px);
            gap: 5px;
            background: #000;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            width: fit-content;
        }

        .preview-tile {
            width: 35px;
            height: 35px;
            background: #444;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            border-radius: 2px;
        }

        .preview-tile.empty { background: #111; }

        /* Main Game Board */
        #puzzle-grid {
            display: grid;
            grid-template-columns: repeat(4, 90px);
            grid-template-rows: repeat(4, 90px);
            gap: 12px;
            background: #111;
            padding: 15px;
            border-radius: 12px;
            box-shadow: inset 0 10px 30px rgba(0,0,0,1);
            border: 4px solid #2a2a2a;
        }

        .tile {
            width: 90px;
            height: 90px;
            background: var(--metal-gradient);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 5px 0 #999, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            user-select: none;
        }

        .tile::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--metal-shine);
            border-radius: 8px;
        }

        .tile:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #999, 0 2px 5px rgba(0,0,0,0.5);
        }

        .tile.empty {
            background: #000 !important;
            box-shadow: inset 0 5px 15px rgba(0,0,0,1);
            cursor: default;
        }
        .tile.empty::after { display: none; }

        /* Buttons */
        button {
            background: linear-gradient(to bottom, #4a90e2, #357abd);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        button:hover { background: #4a90e2; filter: brightness(1.1); }

        #message {
            margin-top: 10px;
            font-weight: bold;
            color: var(--victory-gold);
            text-align: center;
            min-height: 1.2em;
        }

        /* Mobile View */
        @media (max-width: 700px) {
            .app-container { flex-direction: column; align-items: center; }
            .sidebar { border-right: none; border-bottom: 1px solid #333; padding-right: 0; padding-bottom: 20px; width: 100%; align-items: center; }
            #puzzle-grid { grid-template-columns: repeat(4, 70px); grid-template-rows: repeat(4, 70px); }
            .tile { width: 70px; height: 70px; font-size: 24px; }
        }
        .footer {
            margin-top: auto; /* Pushes the footer to the bottom of the sidebar */
            padding-top: 20px;
            border-top: 1px solid var(--sidebar-border);
            width: 100%;
        }

        .dev-card {
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-blue);
        }

        .dev-name {
            font-weight: bold;
            font-size: 0.9rem;
            margin: 0 0 4px 0;
            color: #fff;
        }

        .dev-role {
            font-size: 0.7rem;
            color: #aaa;
            margin: 0 0 8px 0;
            line-height: 1.2;
        }

        .dev-link {
            font-size: 0.75rem;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .dev-link:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h1>15 Puzzle</h1>
        
        <div>
            <div class="section-label">Target Pattern</div>
            <select id="gameMode" onchange="initGame();">
                <option value="linear_asc">Linear (1-15)</option>
                <option value="linear_desc">Linear (15-1)</option>
                <option value="snake_asc">Snake Ascending</option>
                <option value="snake_desc">Snake Descending</option>
                <option value="spiral_asc">Spiral Ascending</option>
                <option value="spiral_desc">Spiral Descending</option>
                <option value="random_custom">Chaos Mode (Random)</option>
            </select>
        </div>

        <div class="challenge-container">
            <div id="challenge-preview" class="preview-grid"></div>
        </div>

        <button onclick="shuffleGame()">Shuffle & Play</button>
        <div id="message"></div>
        <div class="footer">
            <div class="section-label">Developer</div>
                <div class="dev-card">
                    <p class="dev-name">Mohammad Anus Ali</p>
                    <p class="dev-role">Programming enthusiast</p>
                    <a href="https://linkedin.com/in/mdanusali" target="_blank" class="dev-link">Linkedin</a>
                </div>
            </div>
        </div>

    <div class="main-content">
        <div id="puzzle-grid"></div>
    </div>
</div>

<script>
    let tiles = [];
    let targetState = [];
    const grid = document.getElementById('puzzle-grid');
    const preview = document.getElementById('challenge-preview');
    const message = document.getElementById('message');

    // Synthesis Audio
    function playTick() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }

    // Pattern Definitions (Index Mapping)
    const snakeMap = [0,1,2,3, 7,6,5,4, 8,9,10,11, 15,14,13,12];
    const spiralMap = [0,1,2,3, 7,11,15,14, 13,12,8,4, 5,6,10,9];

    function initGame() {
        message.textContent = '';
        const mode = document.getElementById('gameMode').value;
        let baseValues = [...Array(15).keys()].map(i => i + 1);
        let tempTarget = Array(16).fill(null);

        if (mode === "linear_asc") {
            targetState = [...baseValues, null];
        } else if (mode === "linear_desc") {
            targetState = [...baseValues.reverse(), null];
        } else if (mode === "snake_asc") {
            baseValues.forEach((v, i) => tempTarget[snakeMap[i]] = v);
            targetState = tempTarget;
        } else if (mode === "snake_desc") {
            baseValues.reverse().forEach((v, i) => tempTarget[snakeMap[i]] = v);
            targetState = tempTarget;
        } else if (mode === "spiral_asc") {
            baseValues.forEach((v, i) => tempTarget[spiralMap[i]] = v);
            targetState = tempTarget;
        } else if (mode === "spiral_desc") {
            baseValues.reverse().forEach((v, i) => tempTarget[spiralMap[i]] = v);
            targetState = tempTarget;
        } else if (mode === "random_custom") {
            // Generate a solvable random target
            let safeTarget = [...Array(15).keys()].map(i => i + 1).concat(null);
            for(let i=0; i<100; i++) {
                const emptyIdx = safeTarget.indexOf(null);
                const moves = getValidMoves(emptyIdx);
                const moveIdx = safeTarget.indexOf(moves[Math.floor(Math.random() * moves.length)]);
                [safeTarget[emptyIdx], safeTarget[moveIdx]] = [safeTarget[moveIdx], safeTarget[emptyIdx]];
            }
            targetState = safeTarget;
        }

        tiles = [...Array(15).keys()].map(i => i + 1).concat(null);
        render();
        renderPreview();
    }

    function render() {
        grid.innerHTML = '';
        tiles.forEach((tile, idx) => {
            const div = document.createElement('div');
            div.className = 'tile' + (tile === null ? ' empty' : '');
            div.textContent = tile || '';
            if (tile !== null) div.onclick = () => moveTile(idx);
            grid.appendChild(div);
        });
    }

    function renderPreview() {
        preview.innerHTML = '';
        targetState.forEach(tile => {
            const div = document.createElement('div');
            div.className = 'preview-tile' + (tile === null ? ' empty' : '');
            div.textContent = tile || '';
            preview.appendChild(div);
        });
    }

    function getValidMoves(idx) {
        const row = Math.floor(idx / 4), col = idx % 4, moves = [];
        if (row > 0) moves.push(tiles[idx - 4]);
        if (row < 3) moves.push(tiles[idx + 4]);
        if (col > 0) moves.push(tiles[idx - 1]);
        if (col < 3) moves.push(tiles[idx + 1]);
        return moves.filter(m => m !== undefined);
    }

    function moveTile(idx) {
        const emptyIdx = tiles.indexOf(null);
        const validValues = getValidMoves(emptyIdx);
        if (validValues.includes(tiles[idx])) {
            playTick();
            [tiles[idx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[idx]];
            render();
            checkWin();
        }
    }

    function shuffleGame() {
        for (let i = 0; i < 300; i++) {
            const emptyIdx = tiles.indexOf(null);
            const moves = getValidMoves(emptyIdx);
            const moveVal = moves[Math.floor(Math.random() * moves.length)];
            const moveIdx = tiles.indexOf(moveVal);
            [tiles[emptyIdx], tiles[moveIdx]] = [tiles[moveIdx], tiles[emptyIdx]];
        }
        render();
    }

    function checkWin() {
        if (tiles.every((v, i) => v === targetState[i])) {
            message.textContent = "🏆 PATTERN MATCHED!";
        }
    }

    initGame();
</script>
</body>
</html>
