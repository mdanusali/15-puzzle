<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Puzzle Pro</title>
    <style>
        :root {
    --frame-bg: #2c3e50;
    --metal-gradient: linear-gradient(145deg, #e6e6e6, #ffffff);
    --metal-shine: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
    --text-color: #333;
    --accent-shine: #4a90e2;
}

body {
    background: radial-gradient(circle, #454545 0%, #1a1a1a 100%);
    color: white;
    font-family: 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

h1 {
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 2px;
}

/* The Outer Tray */
#puzzle-grid {
    display: grid;
    grid-template-columns: repeat(4, 85px);
    grid-template-rows: repeat(4, 85px);
    gap: 12px;
    background: #1a1a1a;
    padding: 15px;
    border-radius: 12px;
    border: 4px solid #333;
    /* Inset shadow makes the tray look deep */
    box-shadow: 
        inset 0 10px 20px rgba(0,0,0,0.8),
        0 20px 40px rgba(0,0,0,0.6);
}

/* The Metallic Tiles */
.tile {
    width: 85px;
    height: 85px;
    background: var(--metal-gradient);
    color: var(--text-color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    /* Outset shadow makes the tile pop out */
    box-shadow: 
        0 4px 0 #999, /* The "side" of the metal plate */
        0 8px 15px rgba(0,0,0,0.4);
    transition: all 0.1s ease;
}

/* Brushed metal texture effect */
.tile::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--metal-shine);
    pointer-events: none;
}

.tile:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #999, 0 2px 5px rgba(0,0,0,0.4);
}

.tile.empty {
    background: #0f0f0f !important;
    box-shadow: inset 0 2px 10px rgba(0,0,0,1);
    cursor: default;
}

.tile.empty::before { display: none; }

/* Refined Controls */
.controls { margin-top: 40px; }

button {
    background: linear-gradient(to bottom, #444, #222);
    color: #eee;
    padding: 12px 30px;
    border: 1px solid #111;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: 0.3s;
}

button:hover {
    color: #fff;
    box-shadow: 0 0 15px var(--accent-shine);
    border-color: var(--accent-shine);
}

#message {
    margin-top: 20px;
    font-size: 1.2rem;
    color: #ffd700; /* Gold for the win */
    text-shadow: 0 0 10px rgba(255,215,0,0.4);
}
        .mode-selector {
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.mode-selector label {
    font-size: 14px;
    color: #cbd5e0;
    text-transform: uppercase;
    letter-spacing: 1px;
}

select {
    background: #2d3748;
    color: white;
    border: 1px solid #4a5568;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
}

select:focus {
    border-color: var(--accent-shine);
}
        .challenge-container {
    margin-bottom: 20px;
    text-align: center;
}

.preview-grid {
    display: grid;
    grid-template-columns: repeat(4, 30px); /* Smaller tiles */
    grid-template-rows: repeat(4, 30px);
    gap: 4px;
    background: #111;
    padding: 8px;
    border-radius: 6px;
    border: 2px solid #444;
    display: inline-grid;
    box-shadow: inset 0 0 10px #000;
}

.preview-tile {
    width: 30px;
    height: 30px;
    background: linear-gradient(145deg, #555, #333);
    color: #aaa;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    font-weight: bold;
}

.preview-tile.empty {
    background: #000;
}
    /* Add a glow to the preview when in Custom Mode */
.custom-active #challenge-preview {
    border-color: var(--accent-shine);
    box-shadow: 0 0 15px rgba(74, 144, 226, 0.3);
}
        /* Layout Container */
.app-container {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 50px;
    background: #1a1a1a;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
    border: 1px solid #333;
}

/* Sidebar Styling */
.sidebar {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 200px;
    border-right: 1px solid #333;
    padding-right: 40px;
}

.main-content {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Ensure the game looks good in the new layout */
#puzzle-grid {
    /* Existing metallic styles from previous step */
}

/* Mobile Responsiveness: Stack them on small screens */
@media (max-width: 768px) {
    .app-container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 20px;
    }
    .sidebar {
        border-right: none;
        border-bottom: 1px solid #333;
        padding-right: 0;
        padding-bottom: 20px;
        width: 100%;
    }
}
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="header">
            <h1>15 Puzzle Pro</h1>
        </div>

        <div class="mode-selector">
            <label>Pattern:</label>
            <select id="gameMode" onchange="initGame(); shuffleGame();">
                <option value="linear_asc">Linear (1-15)</option>
                <option value="linear_desc">Linear (15-1)</option>
                <option value="snake_asc">Snake Ascending</option>
                <option value="snake_desc">Snake Descending</option>
                <option value="spiral_asc">Spiral Ascending</option>
                <option value="spiral_desc">Spiral Descending</option>
                <option value="random_custom">Chaos Mode (Random)</option>
            </select>
        </div>

        <div class="challenge-container">
            <p>Target Blueprint</p>
            <div id="challenge-preview" class="preview-grid"></div>
        </div>

        <div class="controls">
            <button onclick="shuffleGame()">New Game / Shuffle</button>
        </div>

        <div id="message"></div>
    </div>

    <div class="main-content">
        <div id="puzzle-grid"></div>
    </div>
</div>
<div class="header">
    <h1>15 Puzzle</h1>
    <p>Click adjacent tiles to move them.</p>
</div>
<div class="mode-selector">
    <label>Pattern:</label>
    <select id="gameMode" onchange="initGame(); shuffleGame();">
        <option value="linear_asc">Linear (1-15)</option>
        <option value="linear_desc">Linear (15-1)</option>
        <option value="snake_asc">Snake Ascending</option>
        <option value="snake_desc">Snake Descending</option>
        <option value="spiral_asc">Spiral Ascending</option>
        <option value="spiral_desc">Spiral Descending</option>
        <option value="random_custom">Random Challenge (Chaos Mode)</option>
    </select>
</div>
<div class="challenge-container">
    <p>Target Pattern:</p>
    <div id="challenge-preview" class="preview-grid"></div>
</div>
<div id="puzzle-grid"></div>

<div class="controls">
    <button onclick="shuffleGame()">New Game / Shuffle</button>
</div>

<div id="message"></div>

<script>
    const grid = document.getElementById('puzzle-grid');
    const message = document.getElementById('message');
    let tiles = [];

    // Initialize the board
    // Global variable to track target
let targetState = [];

const previewGrid = document.getElementById('challenge-preview');

function renderPreview() {
    previewGrid.innerHTML = '';
    // targetState is the array we defined in your initGame() logic
    targetState.forEach(tile => {
        const pTile = document.createElement('div');
        pTile.classList.add('preview-tile');
        if (tile === null) {
            pTile.classList.add('empty');
        } else {
            pTile.textContent = tile;
        }
        previewGrid.appendChild(pTile);
    });
}

function initGame() {
    const mode = document.getElementById('gameMode').value;
    const message = document.getElementById('message');
    message.textContent = ''; // Clear previous victory messages
    
    let values = [...Array(15).keys()].map(i => i + 1); // [1, 2, ... 15]

    if (mode === "random_custom") {
        // 1. Generate a RANDOM target state
        let randomTarget = [...values, null];
        // Fisher-Yates shuffle for the target blueprint
        for (let i = randomTarget.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [randomTarget[i], randomTarget[j]] = [randomTarget[j], randomTarget[i]];
        }
        targetState = randomTarget;
        
        // 2. Set the player's board to a different state (or solved state) 
        // and then shuffleGame() will be called to scramble it.
        tiles = [...values, null]; 
    } 
    else {
        // ... Keep your existing snake/spiral/linear logic here ...
        // (As defined in previous steps)
    }

    render();
    renderPreview(); // Update the small blueprint window
}

function checkWin() {
    // Compare current tiles array to the pre-calculated targetState
    const isWin = tiles.every((val, index) => val === targetState[index]);
    
    if (isWin) {
        setTimeout(() => {
            message.textContent = "🎯 CHALLENGE COMPLETE!";
            playVictorySound(); // Optional: A different sound for winning
            
            // Visual feedback: Make the preview glow green
            previewGrid.style.boxShadow = "0 0 20px #38a169";
            previewGrid.style.borderColor = "#38a169";
        }, 150);
    }
}

    function render() {
        grid.innerHTML = '';
        tiles.forEach((tile, index) => {
            const tileDiv = document.createElement('div');
            tileDiv.classList.add('tile');
            if (tile === null) {
                tileDiv.classList.add('empty');
                tileDiv.textContent = '';
            } else {
                tileDiv.textContent = tile;
                tileDiv.addEventListener('click', () => moveTile(index));
            }
            grid.appendChild(tileDiv);
        });
    }

    function playTickSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = 'sine'; // Clean, soft sound
    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // Frequency in Hz
    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);
}

    function moveTile(index) {
        const emptyIndex = tiles.indexOf(null);
    const validMoves = getValidMoves(emptyIndex);

    if (validMoves.includes(index)) {
        // Play the tick sound
        playTickSound();

        // Swap logic
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        render();
        checkWin();
        }    
    }

    function getValidMoves(emptyIndex) {
        const row = Math.floor(emptyIndex / 4);
        const col = emptyIndex % 4;
        const moves = [];

        if (row > 0) moves.push(emptyIndex - 4); // Up
        if (row < 3) moves.push(emptyIndex + 4); // Down
        if (col > 0) moves.push(emptyIndex - 1); // Left
        if (col < 3) moves.push(emptyIndex + 1); // Right

        return moves;
    }

    function shuffleGame() {
        message.textContent = '';
        // Perform 200 random valid moves to ensure solvability
        for (let i = 0; i < 200; i++) {
            const emptyIndex = tiles.indexOf(null);
            const moves = getValidMoves(emptyIndex);
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            [tiles[randomMove], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[randomMove]];
        }
        render();
    }

    

    initGame();
    shuffleGame();
</script>

</body>
</html>
