<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Puzzle Pro</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --tile-color: #ffffff;
            --empty-color: #cbd5e0;
            --text-color: #2d3748;
            --accent-color: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .header { margin-bottom: 20px; text-align: center; }

        #puzzle-grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background-color: #a0aec0;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tile {
            width: 80px;
            height: 80px;
            background-color: var(--tile-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background-color 0.2s;
        }

        .tile:hover { background-color: #edf2f7; }

        .tile.empty {
            background-color: var(--empty-color);
            cursor: default;
        }

        .tile.empty:hover { background-color: var(--empty-color); }

        .controls { margin-top: 20px; }

        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover { background-color: #357abd; }

        #message { margin-top: 15px; font-weight: bold; color: #38a169; }
    </style>
</head>
<body>

<div class="header">
    <h1>15 Puzzle</h1>
    <p>Click adjacent tiles to move them.</p>
</div>

<div id="puzzle-grid"></div>

<div class="controls">
    <button onclick="shuffleGame()">New Game / Shuffle</button>
</div>

<div id="message"></div>

<script>
    const grid = document.getElementById('puzzle-grid');
    const message = document.getElementById('message');
    let tiles = [];

    // Initialize the board
    function initGame() {
        tiles = [...Array(15).keys()].map(i => i + 1);
        tiles.push(null); // The empty space
        render();
    }

    function render() {
        grid.innerHTML = '';
        tiles.forEach((tile, index) => {
            const tileDiv = document.createElement('div');
            tileDiv.classList.add('tile');
            if (tile === null) {
                tileDiv.classList.add('empty');
                tileDiv.textContent = '';
            } else {
                tileDiv.textContent = tile;
                tileDiv.addEventListener('click', () => moveTile(index));
            }
            grid.appendChild(tileDiv);
        });
    }

    function moveTile(index) {
        const emptyIndex = tiles.indexOf(null);
        const validMoves = getValidMoves(emptyIndex);

        if (validMoves.includes(index)) {
            // Swap
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            render();
            checkWin();
        }
    }

    function getValidMoves(emptyIndex) {
        const row = Math.floor(emptyIndex / 4);
        const col = emptyIndex % 4;
        const moves = [];

        if (row > 0) moves.push(emptyIndex - 4); // Up
        if (row < 3) moves.push(emptyIndex + 4); // Down
        if (col > 0) moves.push(emptyIndex - 1); // Left
        if (col < 3) moves.push(emptyIndex + 1); // Right

        return moves;
    }

    function shuffleGame() {
        message.textContent = '';
        // Perform 200 random valid moves to ensure solvability
        for (let i = 0; i < 200; i++) {
            const emptyIndex = tiles.indexOf(null);
            const moves = getValidMoves(emptyIndex);
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            [tiles[randomMove], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[randomMove]];
        }
        render();
    }

    function checkWin() {
        const winState = [...Array(15).keys()].map(i => i + 1);
        winState.push(null);
        
        const isWin = tiles.every((val, index) => val === winState[index]);
        if (isWin) {
            message.textContent = "🎉 Congratulations! You solved it!";
        }
    }

    initGame();
    shuffleGame();
</script>

</body>
</html>
