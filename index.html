<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15 Puzzle Pro</title>
    <style>
        :root {
            --metal-gradient: linear-gradient(145deg, #e6e6e6, #ffffff);
            --metal-shine: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
            --accent-blue: #4a90e2;
        }

        body {
            background: #121212;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Lock height to viewport */
            overflow: hidden; /* Prevent body bounce */
        }

        /* Top Header: Controls & Preview */
        header {
            padding: 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .controls-group { flex: 1; }
        h1 { font-size: 1.1rem; margin: 0 0 8px 0; text-transform: uppercase; color: #888; }

        select {
            background: #2d2d2d;
            color: white;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            width: 100%;
            max-width: 180px;
        }

        /* Blueprint Preview */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 20px);
            gap: 3px;
            background: #000;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        .p-tile { width: 20px; height: 20px; background: #444; font-size: 8px; display: flex; align-items: center; justify-content: center; border-radius: 1px; }
        .p-tile.empty { background: #111; }

        /* Center Game Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #puzzle-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #000;
            padding: 12px;
            border-radius: 12px;
            border: 3px solid #2a2a2a;
            width: 90vw;
            max-width: 380px;
            aspect-ratio: 1/1;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .tile {
            background: var(--metal-gradient);
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            border-radius: 6px;
            position: relative;
            box-shadow: 0 4px 0 #999, 0 8px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .tile::after { content: ''; position: absolute; inset: 0; background: var(--metal-shine); border-radius: 6px; }
        .tile.empty { background: #111 !important; box-shadow: inset 0 4px 8px rgba(0,0,0,0.8); }
        .tile.empty::after { display: none; }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px 0 #2a5a8a;
        }

        #message { margin-top: 10px; height: 20px; color: #ffd700; font-weight: bold; }

        /* Single Line Footer */
        footer {
            background: #111;
            border-top: 1px solid #333;
            padding: 8px 15px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            white-space: nowrap;
        }
        footer b { color: var(--accent-blue); }
        footer a { color: #888; text-decoration: none; margin-left: 10px; border-left: 1px solid #444; padding-left: 10px; }
    </style>
</head>
<body>

<header>
    <div class="controls-group">
        <h1>15 Puzzle</h1>
        <select id="gameMode" onchange="initGame();">
            <option value="linear_asc">Linear (1-15)</option>
            <option value="linear_desc">Linear (15-1)</option>
            <option value="snake_asc">Snake Asc</option>
            <option value="spiral_asc">Spiral Asc</option>
            <option value="random_custom">Chaos Mode</option>
        </select>
    </div>
    <div id="challenge-preview" class="preview-grid"></div>
</header>

<main>
    <div id="puzzle-grid"></div>
    <div id="message"></div>
    <button onclick="shuffleGame()">SHUFFLE & PLAY</button>
</main>

<footer>
    Developed by <b>Mohammad Anus Ali</b> | Programming Enthusiast <a href="https://www.linkedin.com/in/mdanusali/" target="_blank">LinkedIn</a>
</footer>

<script>
    let tiles = [];
    let targetState = [];
    const grid = document.getElementById('puzzle-grid');
    const preview = document.getElementById('challenge-preview');
    const message = document.getElementById('message');

    function playTick() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    const snakeMap = [0,1,2,3, 7,6,5,4, 8,9,10,11, 15,14,13,12];
    const spiralMap = [0,1,2,3, 7,11,15,14, 13,12,8,4, 5,6,10,9];

    function initGame() {
        message.textContent = '';
        const mode = document.getElementById('gameMode').value;
        let baseValues = [...Array(15).keys()].map(i => i + 1);
        let tempTarget = Array(16).fill(null);

        if (mode === "linear_asc") targetState = [...baseValues, null];
        else if (mode === "linear_desc") targetState = [...baseValues.reverse(), null];
        else if (mode === "snake_asc") { baseValues.forEach((v, i) => tempTarget[snakeMap[i]] = v); targetState = tempTarget; }
        else if (mode === "spiral_asc") { baseValues.forEach((v, i) => tempTarget[spiralMap[i]] = v); targetState = tempTarget; }
        else if (mode === "random_custom") {
            let safe = [...Array(15).keys()].map(i => i + 1).concat(null);
            for(let i=0; i<100; i++) {
                const emptyIdx = safe.indexOf(null);
                const moves = getNeighbors(emptyIdx);
                const moveIdx = safe.indexOf(moves[Math.floor(Math.random() * moves.length)]);
                [safe[emptyIdx], safe[moveIdx]] = [safe[moveIdx], safe[emptyIdx]];
            }
            targetState = safe;
        }

        tiles = [...Array(15).keys()].map(i => i + 1).concat(null);
        render();
        renderPreview();
    }

    function render() {
        grid.innerHTML = '';
        tiles.forEach((tile, idx) => {
            const div = document.createElement('div');
            div.className = 'tile' + (tile === null ? ' empty' : '');
            div.textContent = tile || '';
            if (tile !== null) div.onclick = () => moveTile(idx);
            grid.appendChild(div);
        });
    }

    function renderPreview() {
        preview.innerHTML = '';
        targetState.forEach(tile => {
            const div = document.createElement('div');
            div.className = 'p-tile' + (tile === null ? ' empty' : '');
            div.textContent = tile || '';
            preview.appendChild(div);
        });
    }

    function getNeighbors(idx) {
        const row = Math.floor(idx / 4), col = idx % 4, neighbors = [];
        if (row > 0) neighbors.push(tiles[idx - 4]);
        if (row < 3) neighbors.push(tiles[idx + 4]);
        if (col > 0) neighbors.push(tiles[idx - 1]);
        if (col < 3) neighbors.push(tiles[idx + 1]);
        return neighbors.filter(n => n !== undefined);
    }

    function moveTile(idx) {
        const emptyIdx = tiles.indexOf(null);
        if (getNeighbors(emptyIdx).includes(tiles[idx])) {
            playTick();
            [tiles[idx], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[idx]];
            render();
            if (tiles.every((v, i) => v === targetState[i])) message.textContent = "🏆 MATCHED!";
        }
    }

    function shuffleGame() {
        for (let i = 0; i < 200; i++) {
            const emptyIdx = tiles.indexOf(null);
            const moves = getNeighbors(emptyIdx);
            const moveIdx = tiles.indexOf(moves[Math.floor(Math.random() * moves.length)]);
            [tiles[emptyIdx], tiles[moveIdx]] = [tiles[moveIdx], tiles[emptyIdx]];
        }
        render();
    }

    initGame();
</script>
</body>
</html>
